<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;min-height:100vh;}
.app{max-width:900px;margin:0 auto;}
.topbar{background:#1e2235;padding:13px 20px;display:flex;align-items:center;}
.brand-name{font-size:16px;font-weight:500;color:#fff;letter-spacing:2px;}
.brand-name em{font-style:normal;font-weight:300;opacity:.65;}
.brand-tag{font-size:9px;color:rgba(255,255,255,.38);letter-spacing:.3px;margin-top:2px;}
.screen{display:none;}.screen.active{display:block;}
.home-hero{background:#252b42;border-bottom:1px solid rgba(255,255,255,.06);padding:22px 20px 18px;}
.home-eyebrow{font-size:10px;letter-spacing:2px;color:#4caf50;text-transform:uppercase;margin-bottom:7px;}
.home-title{font-size:20px;font-weight:500;color:#f0f2f8;margin-bottom:3px;}
.home-sub{font-size:12px;color:rgba(240,242,248,.6);}
.filter-row{display:flex;gap:6px;margin-top:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.55);cursor:pointer;white-space:nowrap;}
.filter-pill.active{background:#4caf50;border-color:#4caf50;color:#fff;}
.events-wrap{padding:16px 20px;display:flex;flex-direction:column;gap:10px;background:#f0f2f7;}
.event-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;cursor:pointer;}
.event-card:hover{border-color:#9ca3af;}
.ec-inner{display:flex;}.ec-accent{width:4px;flex-shrink:0;}
.ec-main{flex:1;padding:14px 16px;}
.ec-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.ev-status{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
.s-ativo{background:#dcfce7;color:#166534;}.s-proximo{background:#dbeafe;color:#1e40af;}.s-enc{background:#f3f4f6;color:#6b7280;}
.ec-arrow{color:#9ca3af;font-size:14px;}
.ec-name{font-size:14px;font-weight:500;color:#111827;line-height:1.35;margin-bottom:10px;}
.ec-meta{display:flex;flex-direction:column;gap:3px;}
.ec-meta-row{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280;}
.ec-meta-row i{font-size:12px;}
.ec-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid #f3f4f6;}
.leads-lbl{font-size:10px;color:#9ca3af;}.leads-val{font-size:13px;font-weight:500;color:#111827;}
.open-btn{font-size:11px;font-weight:500;color:#4caf50;display:flex;align-items:center;gap:4px;}
.detail-topbar{background:#1e2235;padding:11px 20px;display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,.65);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:6px 12px;border-radius:20px;cursor:pointer;}
.detail-ev-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.8);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tab-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none;gap:2px;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:11px 13px;font-size:11px;font-weight:500;color:#6b7280;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.tab-btn i{font-size:13px;}.tab-btn.active{color:#4caf50;border-bottom-color:#4caf50;}
.tab-content{padding:18px 20px;display:none;background:#f0f2f7;}.tab-content.active{display:block;}
.hero-block{background:#252b42;border-radius:14px;padding:18px;margin-bottom:14px;}
.hero-eyebrow{font-size:9px;letter-spacing:2px;color:#4caf50;text-transform:uppercase;margin-bottom:5px;}
.hero-name{font-size:17px;font-weight:500;color:#f0f2f8;line-height:1.3;margin-bottom:11px;}
.hero-pills{display:flex;flex-wrap:wrap;gap:6px;}
.hpill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid;}
.hp-g{background:rgba(76,175,80,.15);color:#6fcf75;border-color:rgba(76,175,80,.25);}
.hp-b{background:rgba(56,139,255,.12);color:#7ab8ff;border-color:rgba(56,139,255,.22);}
.hp-y{background:rgba(201,168,76,.12);color:#e8c86a;border-color:rgba(201,168,76,.22);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.stat{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 13px;}
.stat-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:#9ca3af;margin-bottom:3px;}
.stat-val{font-size:17px;font-weight:500;color:#111827;}.stat-sub{font-size:10px;color:#9ca3af;margin-top:1px;}
.iblock{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:13px 15px;margin-bottom:8px;}
.iblock-head{font-size:11px;font-weight:500;color:#9ca3af;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.iblock-head i{font-size:13px;color:#4caf50;}.iblock-body{font-size:12px;color:#111827;line-height:1.75;}
.ag-list{display:flex;flex-direction:column;gap:7px;}
.ag-item{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 14px;display:flex;gap:12px;align-items:flex-start;}
.ag-day{background:#1e2235;color:#fff;font-size:10px;font-weight:500;padding:4px 8px;border-radius:6px;white-space:nowrap;text-align:center;line-height:1.5;min-width:56px;flex-shrink:0;}
.ag-title{font-size:12px;font-weight:500;color:#111827;margin-bottom:3px;}
.ag-loc{font-size:11px;color:#6b7280;display:flex;align-items:center;gap:4px;}.ag-loc i{font-size:11px;}
.mbadge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;margin-left:5px;font-weight:500;}
.mb-g{background:#dcfce7;color:#166534;}.mb-b{background:#dbeafe;color:#1e40af;}
.mb-y{background:#fef9c3;color:#854d0e;}.mb-p{background:#ede9fe;color:#5b21b6;}
.mat-cat{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:#9ca3af;margin:14px 0 7px 2px;}
.file-list{display:flex;flex-direction:column;gap:6px;}
.file-row{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:11px;}
.ficon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.fi-pdf{background:#fee2e2;color:#b91c1c;}.fi-ppt{background:#ffedd5;color:#c2410c;}
.fi-xls{background:#dcfce7;color:#15803d;}.fi-vid{background:#dbeafe;color:#1d4ed8;}
.fi-doc{background:#e0f2fe;color:#0369a1;}.fi-zip{background:#ede9fe;color:#6d28d9;}
.file-name{font-size:12px;font-weight:500;color:#111827;flex:1;}
.file-meta{font-size:10px;color:#9ca3af;margin-top:1px;}
.dl-btn{background:none;border:1px solid #d1d5db;border-radius:7px;padding:4px 10px;font-size:11px;cursor:pointer;color:#374151;display:flex;align-items:center;gap:4px;white-space:nowrap;text-decoration:none;}
.dl-btn.dim{opacity:.35;cursor:not-allowed;pointer-events:none;}
.team-label{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:#9ca3af;margin:12px 0 7px 2px;}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:7px;}
.contact-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start;}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#fff;flex-shrink:0;}
.c-name{font-size:12px;font-weight:500;color:#111827;}.c-role{font-size:10px;color:#9ca3af;margin-top:1px;}
.island-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:8px;}
.island{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;}
.island-head{padding:10px 13px 8px;border-bottom:1px solid #f3f4f6;}
.island-strat{font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-weight:500;margin-bottom:3px;}
.island-name{font-size:12px;font-weight:500;color:#111827;}
.island-prods{padding:9px 13px;display:flex;flex-direction:column;gap:4px;}
.prod-row{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280;}
.prod-dot{width:5px;height:5px;border-radius:50%;background:#4caf50;flex-shrink:0;}
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.mkt-stat{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:11px 13px;}
.mkt-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:#9ca3af;margin-bottom:3px;}
.mkt-val{font-size:22px;font-weight:500;color:#111827;}.mkt-sub{font-size:10px;color:#9ca3af;margin-top:1px;}
.speech{background:#f8f9ff;border-left:3px solid #1e2235;border-radius:0 8px 8px 0;padding:11px 14px;margin-bottom:12px;}
.speech-title{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:#1e2235;margin-bottom:5px;font-weight:500;}
.speech-body{font-size:12px;color:#111827;line-height:1.7;}
.lp-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:12px;}
.lp-card-head{background:#252b42;padding:14px 16px;}
.lp-card-title{font-size:13px;font-weight:500;color:#f0f2f8;margin-bottom:2px;}
.lp-card-sub{font-size:11px;color:rgba(240,242,248,.5);}
.lp-card-body{padding:16px;}
.lp-link-section{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px;}
.lp-link-label{font-size:11px;font-weight:500;color:#6b7280;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.lp-link-label i{font-size:13px;color:#4caf50;}
.lp-open-btn{background:#1e2235;color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;width:100%;justify-content:center;margin-top:10px;text-decoration:none;}
.lp-no-link{font-size:12px;color:#9ca3af;text-align:center;padding:10px;}
.empty-state{text-align:center;padding:28px;}
.empty-state i{font-size:26px;color:#d1d5db;display:block;margin-bottom:7px;}
.empty-state p{font-size:12px;color:#9ca3af;line-height:1.6;}
</style>
</head>
<body>
<div class="app">
<div class="topbar"><div><div class="brand-name">LAS<em>FOR</em>LIFE</div><div class="brand-tag">Transformando a Indústria da Doença em Indústria da Saúde</div></div></div>
<div class="screen active" id="homeScreen">
  <div class="home-hero">
    <div class="home-eyebrow">central de congressos</div>
    <div class="home-title">Olá, equipe</div>
    <div class="home-sub">Selecione o evento que deseja acessar</div>
    <div class="filter-row">
      <button class="filter-pill active" onclick="filterBy('todos',this)">Todos</button>
      <button class="filter-pill" onclick="filterBy('ativo',this)">Em andamento</button>
      <button class="filter-pill" onclick="filterBy('próximo',this)">Próximos</button>
      <button class="filter-pill" onclick="filterBy('encerrado',this)">Encerrados</button>
    </div>
  </div>
  <div class="events-wrap" id="eventsGrid"></div>
</div>
<div class="screen" id="detailScreen">
  <div class="detail-topbar">
    <button class="back-btn" onclick="goHome()"><i class="ti ti-arrow-left"></i> Eventos</button>
    <div class="detail-ev-name" id="detailTitle"></div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="tabContent"></div>
</div>
</div>
<script>

var DB={"eventos":[{"id":"1","nome":"SBQ - ITAIPAVA RJ","status":"próximo","data":"26–27 Jun 2026","local":"SP Expo, São Paulo – SP","stand":"A definir","equipe":"Michael e Leo","meta":"","orientacoes":"Baixar todos os materiais antes do evento. "},{"id":"2","nome":"IOT X Congresso Infecção","status":"próximo","data":"16 - 17 Jul 2026","local":"São Paulo – SP","stand":"Stand ","equipe":"Time Indireta de Ortopedia, MKT, Time direta Opcional","meta":"","orientacoes":"Foco em PerOssal e BonOs"}],"agenda":[{"id":"a1","evento_id":"1","dia":"26/06","horario":"11:00–20:00","atividade":"Programação científica + abertura do stand","local":"Vila Itaipava, Itaipava/RJ","badge":"Stand LAS","destaque":"Sim"},{"id":"a4","evento_id":"2","dia":"16/07","horario":"09:00–18:00","atividade":"Stand LAS + demonstração de produtos","local":"Área de exposição","badge":"Stand LAS","destaque":"Sim"}],"materiais":[{"id":"m1","evento_id":"1","nome":"Apresentação pré-feira.pptx","tipo":"PPT","categoria":"Científico & Folder","link":"https://docs.google.com/presentation/d/14JFTA2VuOVpxjDVa7YP_P9K_3F55B8dW/edit?usp=sharing&ouid=114945377181792929526&rtpof=true&sd=true","data":"13/05/2025","ativo":"Sim"}],"equipe":[{"id":"e1","evento_id":"1","nome":"Rafael","cargo":"Diretoria","time":"Time Fixo","telefone":""},{"id":"e2","evento_id":"1","nome":"João","cargo":"Diretoria","time":"Time Fixo","telefone":""},{"id":"e3","evento_id":"1","nome":"Fernando","cargo":"Marketing","time":"Time Fixo","telefone":""},{"id":"e4","evento_id":"1","nome":"Leo","cargo":"Vendas Indiretas","time":"Time Fixo","telefone":""}],"produtos":[{"id":"p1","evento_id":"1","ilha":"Medicina Regenerativa","estrategia":"Gerar Saúde","produto":"CellHarvest","destaque":"Sim"},{"id":"p2","evento_id":"1","ilha":"Medicina Regenerativa","estrategia":"Gerar Saúde","produto":"SpineMed","destaque":""},{"id":"p3","evento_id":"1","ilha":"Ortopedia / Infecção","estrategia":"Tratar a Doença","produto":"Cimentos BonOs","destaque":"Sim"},{"id":"p4","evento_id":"2","ilha":"Ilha do Giro","estrategia":"Articular o Ecossistema","produto":"PulsaClean®","destaque":"Sim"}],"mkt":[{"id":"mk1","evento_id":"1","dress_code":"D1: Polo preta | D2: Polo branca | D3: Polo azul | D4: Polo preta. Calça jeans + tênis + crachá LAS. Entrega: 18/05.","meta":"300","campanhas":"Motor ACF: XX% off. CellHarvest: XX% off. SpineMED: R$XXXK.","acoes":"Ativação Rodrigo Lobo: 21/05 às 16h.","mensagens":"1. Qual dor? 2. Qual produto? 3. Próximo passo?"}],"leads_lp":[{"id":"lp1","evento_id":"1","link":"https://lp.lasforlife.com.br/thyroid-cancer-international-meeting-2026"},{"id":"lp2","evento_id":"2","link":""}]};
var cf='todos',ce=null,ct='visao';
var TC=['#1e2235','#15803d','#1d4ed8','#7c3aed','#b45309','#be185d'];
var SA={'ativo':'#4caf50','próximo':'#3b82f6','encerrado':'#9ca3af'};
var IC={'Medicina Regenerativa':{bg:'#f0fdf4',tc:'#15803d'},'Ortopedia / Infecção':{bg:'#fef2f2',tc:'#b91c1c'},'Ortopedia / Infecção Ortopédica':{bg:'#fef2f2',tc:'#b91c1c'},'Géis Antifibróticos + Neomedic':{bg:'#eff6ff',tc:'#1d4ed8'},'CCP — Inovação':{bg:'#f5f3ff',tc:'#6d28d9'},'Ilha do Giro':{bg:'#fffbeb',tc:'#92400e'}};
function si(s){var l=(s||'').toLowerCase().trim();if(l==='ativo')return{c:'s-ativo',lb:'Em andamento'};if(l==='próximo'||l==='proximo')return{c:'s-proximo',lb:'Próximo'};return{c:'s-enc',lb:'Encerrado'};}
function filterBy(f,btn){cf=f;document.querySelectorAll('.filter-pill').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderEv();}
function renderEv(){
  var list=DB.eventos.filter(function(e){
    if(!e.nome)return false;
    if(cf==='todos')return true;
    var l=(e.status||'').toLowerCase().trim();
    if(cf==='ativo')return l==='ativo';
    if(cf==='próximo')return l==='próximo'||l==='proximo';
    return l==='encerrado';
  });
  var g=document.getElementById('eventsGrid');
  if(!list.length){g.innerHTML='<div class="empty-state"><i class="ti ti-calendar-off"></i><p>Nenhum evento.</p></div>';return;}
  g.innerHTML=list.map(function(e){
    var s=si(e.status);
    var ac=({'ativo':'#4caf50','próximo':'#3b82f6','encerrado':'#9ca3af'})[((e.status||'').toLowerCase().trim())]||'#9ca3af';
    return '<div class="event-card" onclick="openEv(\''+e.id+'\')">'+
      '<div class="ec-inner"><div class="ec-accent" style="background:'+ac+'"></div>'+
      '<div class="ec-main">'+
        '<div class="ec-top"><span class="ev-status '+s.c+'">'+s.lb+'</span><i class="ti ti-arrow-right ec-arrow"></i></div>'+
        '<div class="ec-name">'+e.nome+'</div>'+
        '<div class="ec-meta">'+
          '<div class="ec-meta-row"><i class="ti ti-calendar"></i>'+(e.data||'—')+'</div>'+
          '<div class="ec-meta-row"><i class="ti ti-map-pin"></i>'+(e.local||'—')+'</div>'+
          '<div class="ec-meta-row"><i class="ti ti-users"></i>'+(e.equipe||'—')+'</div>'+
        '</div>'+
        '<div class="ec-footer">'+
          '<div><div class="leads-lbl">Meta</div><div class="leads-val">'+(e.meta||'0')+' leads</div></div>'+
          '<div class="open-btn">Abrir <i class="ti ti-arrow-right"></i></div>'+
        '</div>'+
      '</div></div></div>';
  }).join('');
}
var TABS=[{id:'visao',icon:'ti-layout-dashboard',label:'Visão geral'},{id:'agenda',icon:'ti-calendar',label:'Agenda'},{id:'materiais',icon:'ti-file-download',label:'Materiais'},{id:'equipe',icon:'ti-users',label:'Equipe'},{id:'produtos',icon:'ti-vaccine-bottle',label:'Produtos'},{id:'mkt',icon:'ti-speakerphone',label:'MKT'},{id:'leads',icon:'ti-forms',label:'Leads'}];
function openEv(id){ce=DB.eventos.find(function(e){return e.id===id;});if(!ce)return;ct='visao';document.getElementById('homeScreen').classList.remove('active');document.getElementById('detailScreen').classList.add('active');document.getElementById('detailTitle').textContent=ce.nome;document.getElementById('tabBar').innerHTML=TABS.map(function(t){return'<button class="tab-btn'+(t.id==='visao'?' active':'')+'" onclick="swTab(\''+t.id+'\',this)"><i class="ti '+t.icon+'"></i>'+t.label+'</button>';}).join('');rdTab('visao');}
function goHome(){document.getElementById('detailScreen').classList.remove('active');document.getElementById('homeScreen').classList.add('active');}
function swTab(id,btn){ct=id;document.querySelectorAll('#tabBar .tab-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');rdTab(id);}
function rdTab(id){var ev=ce,eid=ev.id,html='';
if(id==='visao'){var s=si(ev.status);html='<div class="hero-block"><div class="hero-eyebrow">'+s.lb.toLowerCase()+'</div><div class="hero-name">'+ev.nome+'</div><div class="hero-pills"><span class="hpill hp-g"><i class="ti ti-calendar" style="font-size:10px;margin-right:3px"></i>'+(ev.data||'')+'</span><span class="hpill hp-b"><i class="ti ti-map-pin" style="font-size:10px;margin-right:3px"></i>'+(ev.local||'')+'</span>'+(ev.stand?'<span class="hpill hp-y">'+ev.stand+'</span>':'')+
'</div></div><div class="stat-grid"><div class="stat"><div class="stat-lbl">Data</div><div class="stat-val" style="font-size:13px">'+(ev.data||'—')+'</div></div><div class="stat"><div class="stat-lbl">Local</div><div class="stat-val" style="font-size:12px">'+(ev.local||'—').split(',')[0]+'</div></div><div class="stat"><div class="stat-lbl">Meta</div><div class="stat-val">'+(ev.meta||'—')+'</div><div class="stat-sub">leads</div></div><div class="stat"><div class="stat-lbl">Equipe</div><div class="stat-val" style="font-size:12px">'+(ev.equipe||'—')+'</div></div></div>'+(ev.orientacoes?'<div class="iblock"><div class="iblock-head"><i class="ti ti-alert-circle"></i> Orientações gerais</div><div class="iblock-body">'+ev.orientacoes+'</div></div>':'');}
else if(id==='agenda'){var ag=DB.agenda.filter(function(a){return a.evento_id===eid;});if(!ag.length){html='<div class="empty-state"><i class="ti ti-calendar-off"></i><p>Nenhum item de agenda.</p></div>';}else{var bm={Cocktail:'mb-y','Ativação':'mb-p','Stand LAS':'mb-g',Convite:'mb-b'};html='<div class="ag-list">'+ag.map(function(a){var b=a.badge?'<span class="mbadge '+(bm[a.badge]||'mb-b')+'">'+a.badge+'</span>':'';var las=a.destaque==='Sim'?'<span class="mbadge mb-g">LAS</span>':'';return'<div class="ag-item"><span class="ag-day">'+(a.dia||'').replace(' ','<br/>')+'</span><div><div class="ag-title">'+(a.atividade||'')+las+'</div><div class="ag-loc"><i class="ti ti-map-pin"></i>'+(a.local||'')+b+'</div>'+(a.horario?'<div class="ag-loc" style="margin-top:2px"><i class="ti ti-clock"></i>'+a.horario+'</div>':'')+'</div></div>';}).join('')+'</div>';}}
else if(id==='materiais'){var mt=DB.materiais.filter(function(m){return m.evento_id===eid&&m.ativo!=='Não'&&m.nome;});if(!mt.length){html='<div class="empty-state"><i class="ti ti-file-off"></i><p>Nenhum material.</p></div>';}else{var cs=[];mt.forEach(function(m){if(m.categoria&&cs.indexOf(m.categoria)<0)cs.push(m.categoria);});if(!cs.length)cs=['Geral'];var im={PDF:'fi-pdf',PPT:'fi-ppt',XLS:'fi-xls','Vídeo':'fi-vid',Doc:'fi-doc',ZIP:'fi-zip'};var ic={PDF:'file-type-pdf',PPT:'presentation',XLS:'table','Vídeo':'player-play',Doc:'file',ZIP:'file-zip'};html=cs.map(function(cat){var cm=cat==='Geral'?mt:mt.filter(function(m){return m.categoria===cat;});if(!cm.length)return'';return'<div class="mat-cat">'+cat+'</div><div class="file-list">'+cm.map(function(m){var fc=im[m.tipo]||'fi-doc',fi=ic[m.tipo]||'file';var hf=m.arquivo_base64&&m.arquivo_base64.length>100;var hl=m.link&&m.link!=='';var iv=m.tipo==='Vídeo';var db='<span class="dl-btn dim"><i class="ti ti-clock"></i> Em breve</span>';if(hf){db='<a href="'+m.arquivo_base64+'" download="'+(m.arquivo_nome||m.nome)+'" class="dl-btn"><i class="ti ti-download"></i> Baixar</a>';}else if(hl){db='<a href="'+m.link+'" target="_blank" class="dl-btn"><i class="ti ti-'+(iv?'external-link':'download')+'"></i>'+(iv?'Abrir':'Baixar')+'</a>';}return'<div class="file-row"><div class="ficon '+fc+'"><i class="ti ti-'+fi+'"></i></div><div style="flex:1"><div class="file-name">'+m.nome+'</div><div class="file-meta">'+(m.tipo||'')+(m.data?' · '+m.data:'')+'</div></div>'+db+'</div>';}).join('')+'</div>';}).join('');}}
else if(id==='equipe'){var mb=DB.equipe.filter(function(p){return p.evento_id===eid&&p.nome;});if(!mb.length){html='<div class="empty-state"><i class="ti ti-users-off"></i><p>Nenhum membro.</p></div>';}else{var ts=[];mb.forEach(function(p){if(p.time&&ts.indexOf(p.time)<0)ts.push(p.time);});if(!ts.length)ts=['Equipe'];html=ts.map(function(t){var gr=t==='Equipe'?mb:mb.filter(function(p){return p.time===t;});if(!gr.length)return'';return'<div class="team-label">'+t+' ('+gr.length+')</div><div class="team-grid">'+gr.map(function(p,i){var ini=p.nome.split(' ').map(function(n){return n[0]||'';}).join('').toUpperCase().slice(0,2);return'<div class="contact-card"><div class="av" style="background:'+TC[i%TC.length]+'">'+ini+'</div><div><div class="c-name">'+p.nome+'</div><div class="c-role">'+(p.cargo||'')+'</div>'+(p.telefone?'<div style="font-size:10px;color:#9ca3af;margin-top:3px"><i class="ti ti-phone" style="font-size:11px"></i> '+p.telefone+'</div>':'')+'</div></div>';}).join('')+'</div>';}).join('');}}
else if(id==='produtos'){var pr=DB.produtos.filter(function(p){return p.evento_id===eid&&p.produto;});if(!pr.length){html='<div class="empty-state"><i class="ti ti-vaccine-bottle"></i><p>Nenhum produto.</p></div>';}else{var il=[];pr.forEach(function(p){if(p.especialidade&&il.indexOf(p.especialidade)<0)il.push(p.especialidade);});html='<div class="island-grid">'+il.map(function(esp){var ip=pr.filter(function(p){return p.especialidade===esp;});var ico=IC[esp]||{bg:'#f9fafb',tc:'#6b7280'};var st=ip[0].estrategia||'';return'<div class="island"><div class="island-head" style="background:'+ico.bg+'"><div class="island-strat" style="color:'+ico.tc+'">'+st+'</div><div class="island-name">'+esp+'</div></div><div class="island-prods">'+ip.map(function(p){return'<div class="prod-row"><div class="prod-dot"'+(p.destaque!=='Sim'?' style="background:#d1d5db"':'')+' ></div>'+p.produto+'</div>';}).join('')+'</div></div>';}).join('')+'</div>';}}
else if(id==='mkt'){var mr=DB.mkt.find(function(m){return m.evento_id===eid;});if(!mr){html='<div class="empty-state"><i class="ti ti-speakerphone"></i><p>Nenhuma info de MKT.</p></div>';}else{html='<div class="mkt-grid"><div class="mkt-stat"><div class="mkt-lbl">Meta total</div><div class="mkt-val">'+(mr.meta||'—')+'</div><div class="mkt-sub">leads</div></div><div class="mkt-stat"><div class="mkt-lbl">Benchmark</div><div class="mkt-val">6–7</div><div class="mkt-sub">leads/pessoa/dia</div></div></div>'+(mr.dress_code?'<div class="iblock"><div class="iblock-head"><i class="ti ti-shirt"></i> Dress code</div><div class="iblock-body">'+mr.dress_code+'</div></div>':'')+(mr.campanhas?'<div class="iblock"><div class="iblock-head"><i class="ti ti-discount-2"></i> Campanhas</div><div class="iblock-body">'+mr.campanhas+'</div></div>':'')+(mr.acoes?'<div class="iblock"><div class="iblock-head"><i class="ti ti-star"></i> Ações especiais</div><div class="iblock-body">'+mr.acoes+'</div></div>':'')+(mr.mensagens?'<div class="iblock"><div class="iblock-head"><i class="ti ti-message-circle"></i> Mensagens-chave</div><div class="iblock-body">'+mr.mensagens+'</div></div>':'');}}
else if(id==='leads'){var lpr=DB.leads_lp.find(function(l){return l.evento_id===eid;});var lpl=lpr?lpr.link:'';html='<div class="lp-card"><div class="lp-card-head"><div class="lp-card-title">'+ev.nome+'</div><div class="lp-card-sub">Landing page de captura de leads</div></div><div class="lp-card-body"><div class="lp-link-section"><div class="lp-link-label"><i class="ti ti-link"></i> LP deste evento</div>'+(lpl?'<a href="'+lpl+'" target="_blank" class="lp-open-btn"><i class="ti ti-external-link"></i> Abrir LP de captação</a>':'<div class="lp-no-link">Nenhum link configurado.</div>')+'</div></div></div><div class="speech"><div class="speech-title">Speech no stand</div><div class="speech-body">1. Qual dor? — Identifique o problema do visitante<br/>2. Qual produto encaixa? — Conecte à especialidade correta<br/>3. Qual o próximo passo? — Direcione para a LP ou feche pedido</div></div>';}
document.getElementById('tabContent').innerHTML='<div class="tab-content active">'+html+'</div>';}
